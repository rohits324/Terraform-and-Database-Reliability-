# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions — terraform.yml

name: Terraform CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  pull-requests: write # required to post PR comments

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "us-east-1"

jobs:
  # ── Formatting Check () ──────────────────────
  fmt:
    name: "Terraform Format Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check formatting (recursive)
        run: terraform fmt -check -recursive infra/
 
  # ── Dev Environment: Validate + Plan ──────────────────────────────────────
  terraform-dev:
    name: "Terraform Plan — dev"
    runs-on: ubuntu-latest
    needs: fmt
    defaults:
      run:
        working-directory: infra/envs/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (mock for plan-only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID || 'AKIAIOSFODNN7EXAMPLE' }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY || 'wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY' }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init (backend=false for plan-only)
        id: init
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -var="db_password=DummyPassword123!" \
            -refresh=false \
            -no-color \
            -out=tfplan-dev 2>&1 | tee plan-dev.txt
        continue-on-error: true

      # Post plan output as a PR comment so reviewers can see what will change
      - name: Post plan to PR (dev)
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/envs/dev/plan-dev.txt', 'utf8');
            const maxLen = 60000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (truncated)'
              : plan;

            const body = `## Terraform Plan — \`dev\` environment

            **Init**: \`${{ steps.init.outcome }}\`
            **Validate**: \`${{ steps.validate.outcome }}\`
            **Plan**: \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            *Triggered by: @${{ github.actor }} | Workflow: \`${{ github.workflow }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload plan artifact (dev)
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: infra/envs/dev/plan-dev.txt
          retention-days: 7

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ── Prod Environment: Validate + Plan ─────────────────────────────────────
  terraform-prod:
    name: "Terraform Plan — prod"
    runs-on: ubuntu-latest
    needs: fmt
    defaults:
      run:
        working-directory: infra/envs/prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (mock for plan-only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID || 'AKIAIOSFODNN7EXAMPLE' }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY || 'wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY' }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init (backend=false for plan-only)
        id: init
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -var="db_password=DummyPassword456!" \
            -refresh=false \
            -no-color \
            -out=tfplan-prod 2>&1 | tee plan-prod.txt
        continue-on-error: true

      - name: Post plan to PR (prod)
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/envs/prod/plan-prod.txt', 'utf8');
            const maxLen = 60000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (truncated)'
              : plan;

            const body = `## Terraform Plan — \`prod\` environment

            **Init**: \`${{ steps.init.outcome }}\`
            **Validate**: \`${{ steps.validate.outcome }}\`
            **Plan**: \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            *Triggered by: @${{ github.actor }} | Workflow: \`${{ github.workflow }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload plan artifact (prod)
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: infra/envs/prod/plan-prod.txt
          retention-days: 7

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
