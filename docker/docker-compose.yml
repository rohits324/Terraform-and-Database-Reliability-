# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml  — Local PostgreSQL for development & testing
#
# Services:
#   postgres  — PostgreSQL 16, auto-runs all files in ../migrations/ on first start
#   pgadmin   — Optional web UI at http://localhost:5050
#
# Usage:
#   docker compose up -d          # start
#   docker compose down           # stop (data preserved in volume)
#   docker compose down -v        # stop + wipe data
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: hotel_booking_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotel_booking
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro   # auto-runs *.sql on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d hotel_booking"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Optional: pgAdmin Web UI ──────────────────────────────────────────────
  # Access at http://localhost:5050
  # Login: admin@admin.com / admin
  # Add server: host=postgres, port=5432, user=appuser, pass=localpassword
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hotel_booking_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools   # only starts with: docker compose --profile tools up -d

volumes:
  postgres_data:
    driver: local
